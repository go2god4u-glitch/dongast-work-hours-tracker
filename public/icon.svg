<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="55%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="55%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
    <filter id="sunGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" />
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="512" height="512" rx="96" fill="url(#sky)"/>

  <!-- Sun glow -->
  <circle cx="256" cy="320" r="160" fill="#fcd34d" opacity="0.35" filter="url(#sunGlow)"/>

  <!-- Sun rays -->
  <g stroke="#fffbeb" stroke-width="16" stroke-linecap="round" opacity="0.9">
    <line x1="256" y1="125" x2="256" y2="185"/>
    <line x1="105" y1="280" x2="160" y2="280"/>
    <line x1="407" y1="280" x2="352" y2="280"/>
    <line x1="142" y1="170" x2="186" y2="210"/>
    <line x1="370" y1="170" x2="326" y2="210"/>
  </g>

  <!-- Sun (rising over horizon) -->
  <circle cx="256" cy="320" r="105" fill="url(#sun)"/>

  <!-- Horizon glow line -->
  <line x1="60" y1="395" x2="452" y2="395" stroke="rgba(255,255,255,0.45)" stroke-width="3" stroke-linecap="round"/>

  <!-- Checkmark badge in top-right -->
  <g transform="translate(370, 130)">
    <circle cx="0" cy="0" r="58" fill="#10b981" stroke="#ffffff" stroke-width="8"/>
    <path d="M -24 2 L -7 20 L 26 -18" stroke="#ffffff" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
